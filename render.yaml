services:
  - type: web
    name: hawkeye-pentest-suite
    runtime: python
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
    disk:
      name: hawkeye-data
      mountPath: /opt/render/project/src/backend
      sizeGB: 1
